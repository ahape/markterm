<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #e0e0e0;
            background-color: #1a1a1a;
            margin: 0;
            padding: 20px;
        }
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Dark mode markdown styles */
        h1, h2, h3, h4, h5, h6 {
            color: #ffffff;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        h1 { border-bottom: 1px solid #333; padding-bottom: 0.3em; }
        p, li { color: #cccccc; }
        a { color: #4dabf7; text-decoration: none; }
        a:hover { text-decoration: underline; }
        code {
            background-color: #2d2d2d;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            color: #f8f8f2;
        }
        pre {
            background-color: #2d2d2d;
            padding: 1em;
            border-radius: 5px;
            margin: 1em 0;
            overflow-x: auto;
            color: #f8f8f2;
        }
        blockquote {
            border-left: 4px solid #666;
            padding-left: 1em;
            margin-left: 0;
            color: #aaaaaa;
            font-style: italic;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }
        th, td {
            border: 1px solid #444;
            padding: 0.5em;
            text-align: left;
        }
        th {
            background-color: #333;
            color: #ffffff;
        }
        ul, ol { color: #cccccc; }
    </style>
</head>
<body>
    <div class="content">
        {{CONTENT}}
    </div>
</body>
</html>
